      identifier: CloudRecAutomationPipelinesMSTeams
      pipelineEvents:
        - type: PipelineSuccess
        - type: PipelineFailed
      notificationMethod:
        type: MsTeams
        spec:
          userGroups: []
          msTeamKeys:
