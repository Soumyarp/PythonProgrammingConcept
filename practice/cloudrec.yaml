pipeline:
  identifier: E2E_Automation
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: Cloud_Ingestion_Rec_E2E_Automation
        repoName: https://github.com/verint-CloudREC/E2E_Automation.git
        build: <+input>
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: CloudRecAutomation
              namespace: hydra-harness-cicd-delegate
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: BuildAndPushDockerRegistry_1
                  spec:
                    connectorRef: quayhydraverintcomcloudrecordingautomation
                    repo: quay.hydra.verint.com/cloud-recording-automation/e2e_automation
                    tags:
                      - latest
                      - <+pipeline.sequenceId>
                    resources:
                      limits:
                        memory: 5G
    - stage:
        name: Run Tests
        identifier: Run_Tests
        description: ""
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: CheckKafkaExecution
                  identifier: CheckKafkaExecution
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |-
                          API_KEY=<+pipeline.stages.Run_Tests.spec.execution.steps.CheckKafkaExecution.spec.environmentVariables.API_KEY>
                          str=$(curl -i -X GET \
                            'https://app.harness.io/ng/api/variables/Kafka_Execution_Count?accountIdentifier=20ZrFxKoQ8ieGARA-Z8pVg&orgIdentifier=EDM&projectIdentifier=CloudRecAutomation' \
                            -H "x-api-key: $API_KEY")
                          search1="\"fixedValue\":\""
                          prefix1=${str%%$search1*}
                          echo ${#prefix1}
                          search2="\",\"defaultValue"
                          prefix2=${str%%$search2*}
                          echo ${#prefix2}

                          #echo $((prefix))

                          current_count=${str:${#prefix1}+14:${#prefix2}-${#prefix1}-14}
                          #echo $current_count

                          while [ $((current_count)) -ge 1 ]
                          do
                              sleep 30
                              str=$(curl -i -X GET \
                                'https://app.harness.io/ng/api/variables/Kafka_Execution_Count?accountIdentifier=20ZrFxKoQ8ieGARA-Z8pVg&orgIdentifier=EDM&projectIdentifier=CloudRecAutomation' \
                                -H "x-api-key: $API_KEY")
                            search1="\"fixedValue\":\""
                            prefix1=${str%%$search1*}
                            search2="\",\"defaultValue"
                            prefix2=${str%%$search2*}
                            current_count=${str:${#prefix1}+14:${#prefix2}-${#prefix1}-14}
                          done
                    environmentVariables:
                      - name: API_KEY
                        type: Secret
                        value: Harness_API_Key
                    outputVariables: []
                  timeout: 2h
              - step:
                  type: ShellScript
                  name: UpdateE2EExecutionCount
                  identifier: UpdateE2EExecutionCount
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |+
                          API_KEY=<+pipeline.stages.Run_Tests.spec.execution.steps.CheckKafkaExecution.spec.environmentVariables.API_KEY>
                          str=$(curl -i -X GET \
                            'https://app.harness.io/ng/api/variables/E2E_Execution?accountIdentifier=20ZrFxKoQ8ieGARA-Z8pVg&orgIdentifier=EDM&projectIdentifier=CloudRecAutomation' \
                            -H "x-api-key: $API_KEY")
                          search1="\"fixedValue\":\""
                          prefix1=${str%%$search1*}
                          search2="\",\"defaultValue"
                          prefix2=${str%%$search2*}

                          current_count=${str:${#prefix1}+14:${#prefix2}-${#prefix1}-14}
                          new_count=$((current_count+1))
                          curl -i -X PUT 'https://app.harness.io/ng/api/variables?accountIdentifier=20ZrFxKoQ8ieGARA-Z8pVg' -H 'Content-Type: application/json' -H "x-api-key: $API_KEY" -d "{\"variable\": {\"identifier\": \"E2E_Execution\", \"name\": \"E2E_Execution_Count\", \"description\": \"E2E_Execution_Count\", \"orgIdentifier\": \"EDM\", \"projectIdentifier\": \"CloudRecAutomation\",\"type\": \"String\", \"spec\": {\"valueType\": \"FIXED\", \"fixedValue\": \"$new_count\" } }}"

                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
              - parallel:
                  - step:
                      type: Container
                      name: Run MT Tests
                      identifier: Run_Tests
                      spec:
                        connectorRef: quayhydraverintcomcloudrecordingautomation
                        image: quay.hydra.verint.com/cloud-recording-automation/e2e_automation
                        command: |-
                          {
                              cd ../automation/
                              echo 52.54.63.228 CFE5CONF1.telab.local >> /etc/hosts 
                              python -m pytest \
                                      tests/APItests/test_createJWTToken_TenantA.py \
                                      tests/SessionExpiry/test_sessionExpiryCheck.py \
                                      tests/APItests/test_ingestValidFile_TenantA_mono_Overlap.py \
                                      tests/APItests/test_ingestValidFile_AQS.py \
                                      tests/APItests/test_ingestValidFile_InteractionEvents.py \
                                      tests/APItests/test_createJWTToken_TenantB.py \
                                      tests/APItests/test_ingestValidFile_TenantB_stereo.py \
                                      tests/APItests/test_ingestValidFile_TenantB1_mixed.py \
                                      tests/APItests/test_ingestValidFile_TenantB2_SilenceGap.py \
                                      tests/APItests/test_ingestMultipleContent.py \
                                      tests/APItests/test_ingestValidFile_Snipetting.py \
                                      tests/APItests/test_ingestValidFile_Stitching.py \
                                      tests/APItests/test_ingestValidFile_Uncompressed.py \
                                      tests/APItests/test_ingestInValidFile_TenantA.py \
                                      tests/APItests/test_validateInteractionEventTags.py \
                                      tests/UItests/test_login_page_for_Tenant_A_and_Tenant_B.py \
                                      tests/UItests/test_search_interaction_and_play_for_Tenant_A_and_Tenant_B.py \
                                      tests/UItests/test_search_interaction_with_multiple_content_and_play.py \
                                      tests/UItests/test_search_snippet_interaction_and_play.py \
                                      tests/UItests/test_search_stitched_interaction_and_play.py \
                                      tests/UItests/test_search_uncompressed_interaction_and_play.py \
                                      tests/APItests/test_searchInteractionsDASAPI_TenantSafe.py \
                                      tests/APItests/test_validateAQS.py \
                                      --json=reports/report.json --html=reports/report.html
                              pytest_status=$?
                          } || {
                            echo "MT Pytest failed" 
                          }
                          cd ../src
                          python app_quality_analytics.py ./../automation/reports/report.json autobots e2e

                          echo $pytest_status
                          exit $pytest_status
                        shell: Sh
                        infrastructure:
                          type: KubernetesDirect
                          spec:
                            connectorRef: CloudRecAutomation
                            namespace: hydra-harness-cicd-delegate
                            resources:
                              limits:
                                cpu: "2"
                                memory: 2000Mi
                            annotations: {}
                            labels: {}
                            containerSecurityContext:
                              capabilities:
                                drop: []
                                add: []
                              runAsNonRoot: false
                            nodeSelector: {}
                            os: Linux
                        outputVariables: []
                        envVariables:
                          HOST: CFE5CONF1.telab.local
                          INGESTOR: apigw.us-east-1.wrk-1.aws.hydra.verint.com/int
